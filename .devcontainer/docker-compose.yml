# Dev environment for RateMyTown.sg.
# The `app` service is the dev container; db/cache/blob are sibling services
# the app reaches by hostname (db, cache, blob) over the compose network.
services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22
    command: sleep infinity
    volumes:
      - ..:/workspaces/ratemytown:cached
    environment:
      DATABASE_URL: postgresql://node:node@db:5432/ratemytown
      REDIS_URL: redis://cache:6379
      S3_ENDPOINT: http://blob:9000
      S3_ACCESS_KEY: ratemytown
      S3_SECRET_KEY: ratemytown-dev-secret
      S3_BUCKET: ratemytown-uploads
    depends_on:
      - db
      - cache
      - blob

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: node
      POSTGRES_PASSWORD: node
      POSTGRES_DB: ratemytown

  cache:
    image: redis:7-alpine

  blob:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ratemytown
      MINIO_ROOT_PASSWORD: ratemytown-dev-secret
