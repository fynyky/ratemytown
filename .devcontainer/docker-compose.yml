# Dev environment for RateMyTown.sg.
# The `app` service is the dev container; db/redis/minio are sibling services
# the app reaches by hostname (db, redis, minio) over the compose network.
services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22
    command: sleep infinity
    volumes:
      - ..:/workspaces/ratemytown:cached
    environment:
      DATABASE_URL: postgresql://node:node@db:5432/ratemytown
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ratemytown
      S3_SECRET_KEY: ratemytown-dev-secret
      S3_BUCKET: ratemytown-uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: node
      POSTGRES_PASSWORD: node
      POSTGRES_DB: ratemytown
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U node -d ratemytown"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ratemytown
      MINIO_ROOT_PASSWORD: ratemytown-dev-secret
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
